# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/da_khoahoc}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:1111}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# JWT Configuration - MUST be set via environment variable
# Generate secure secret: openssl rand -base64 64
# CRITICAL: JWT_SECRET must be at least 32 characters (256 bits)
jwt.secret=${JWT_SECRET:K0BvN3dWejQ5MWpTZEhUcFpLRVRxVlpnTDF6amVCR2ZpMzluQnN4NmNwYz0=}
jwt.expiration.ms=${JWT_EXPIRATION:86400000}

# Logging Configuration
logging.level.root=INFO
logging.level.org.example.khoahoconl=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

