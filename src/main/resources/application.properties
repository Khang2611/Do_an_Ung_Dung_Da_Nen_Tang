# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/da_khoahoc}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration - MUST be set via environment variable
# Generate secure secret: openssl rand -base64 64
# CRITICAL: JWT_SECRET must be at least 32 characters (256 bits)
jwt.secret=${JWT_SECRET:d1I0eTI5dWdmaGoyN2VqMjk0eTh5MTN1ZTlkaGd0ZTM5OGQyMWplejNqa2RmNzNlczloMTIz}
jwt.expiration.ms=${JWT_EXPIRATION:86400000}

# Logging Configuration
logging.level.root=INFO
logging.level.org.example.khoahoconl=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Payment Gateway Integration (LMS -> Gateway)
payment.gateway.url=${GATEWAY_URL:http://localhost:8090}
payment.gateway.api-key=${GATEWAY_API_KEY:LMS_API_KEY}
payment.gateway.secret-key=${GATEWAY_SECRET_KEY:SHARED_HMAC_SECRET_2024}
payment.gateway.return-url=${GATEWAY_RETURN_URL:http://localhost:8080/api/payments/callback}

# Payment Webhook Integration (Gateway -> LMS callback)
# api-key: key ma Gateway gui kem khi callback ve LMS
# secret-key: dung chung voi Gateway de verify signature
payment.webhook.api-key=${WEBHOOK_API_KEY:GATEWAY_CALLBACK_KEY}
payment.webhook.secret-key=${WEBHOOK_SECRET_KEY:SHARED_HMAC_SECRET_2024}
payment.webhook.callback-url=${WEBHOOK_CALLBACK_URL:http://localhost:8080/api/payments/ipn}

# Admin Account Initialization (override via env vars in production)
admin.username=${ADMIN_USERNAME:admin}
admin.password=${ADMIN_PASSWORD:Admin@123}
admin.email=${ADMIN_EMAIL:admin@khoahoc.com}

# MinIO Configuration
minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
minio.secret-key=${MINIO_SECRET_KEY:minioadmin}
minio.bucket-name=${MINIO_BUCKET_NAME:videos}
