# ===================================================================
# Database Configuration
# ===================================================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/da_khoahoc}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# Security & JWT Configuration
# ===================================================================
# Secret key này cần khớp với các service khác nếu dùng chung
jwt.secret=${JWT_SECRET:d1I0eTI5dWdmaGoyN2VqMjk0eTh5MTN1ZTlkaGd0ZTM5OGQyMWplejNqa2RmNzNlczloMTIz}
jwt.expiration.ms=${JWT_EXPIRATION:86400000}

# ===================================================================
# Payment Gateway Integration (LMS Side)
# ===================================================================
payment.gateway.url=${PAYMENT_GATEWAY_URL:http://localhost:8090}

# Webhook (IPN) callback URL - Khớp với mapping trong Controller
payment.webhook.callback-url=${WEBHOOK_CALLBACK_URL:http://localhost:8080/api/webhook/payment}

# Keys dùng để xác thực với Gateway (Đồng bộ với app Payment Gateway)
payment.webhook.api-key=GATEWAY_CALLBACK_KEY
payment.webhook.secret-key=SHARED_HMAC_SECRET_2024

# ===================================================================
# Logging Configuration
# ===================================================================
logging.level.root=INFO
logging.level.org.example.khoahoc=INFO
logging.level.org.hibernate.SQL=DEBUG

# ===================================================================
# File Storage (MinIO)
# ===================================================================
minio.endpoint=http://localhost:9000
minio.access-key=minioadmin
minio.secret-key=minioadmin
minio.bucket-name=khoahoc-videos

# ===================================================================
# Admin Account Configuration
# ===================================================================
admin.username=${ADMIN_USERNAME:admin}
admin.password=${ADMIN_PASSWORD:admin123}
admin.email=${ADMIN_EMAIL:admin@example.com}
