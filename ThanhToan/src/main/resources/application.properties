spring.application.name=PaymentGateway
server.port=8090

# =============================================
# Bắt buộc dùng Servlet (MVC + Tomcat), tránh xung đột với webflux
# =============================================
spring.main.web-application-type=servlet

# =============================================
# MySQL - dùng chung DB với KhoaHoc
# Port 3306 (chuẩn MySQL), cùng DB da_khoahoc với KhoaHoc app
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/da_khoahoc?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# =============================================
# Thymeleaf
# =============================================
spring.thymeleaf.cache=false

# =============================================
# KhoaHoc App - địa chỉ để gọi webhook (IPN)
# =============================================
khoahoc.base-url=http://localhost:8080
# Khớp với mapping trong PaymentWebhookController của LMS
khoahoc.webhook.url=${khoahoc.base-url}/api/webhook/payment
# Khớp với payment.webhook.api-key của LMS
khoahoc.webhook.api-key=GATEWAY_CALLBACK_KEY
# Khớp với payment.webhook.secret-key của LMS
khoahoc.webhook.secret-key=SHARED_HMAC_SECRET_2024

# =============================================
# Cấu hình định danh Gateway (LMS sẽ gửi kèm khi gọi sang)
# =============================================
gateway.api-key=LMS_API_KEY
gateway.secret-key=SHARED_HMAC_SECRET_2024

# =============================================
# Thời gian giả lập thanh toán (giây)
# =============================================
payment.simulation.delay-seconds=3

# =============================================
# Upload file
# =============================================
spring.servlet.multipart.enabled=false
