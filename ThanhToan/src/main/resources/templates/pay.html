<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh Toán - EduPay Gateway</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="page-wrapper">

    <!-- Header -->
    <header class="gw-header">
        <div class="header-inner">
            <div class="logo">
                <span class="logo-icon">⚡</span>
                <span class="logo-text">EduPay Gateway</span>
            </div>
            <div class="secure-badge">
                <span class="lock-icon">🔒</span> Kết nối bảo mật SSL
            </div>
        </div>
    </header>

    <!-- Progress Bar -->
    <div class="progress-bar-wrap">
        <div class="progress-step active">
            <div class="step-dot">1</div>
            <div class="step-label">Chọn phương thức</div>
        </div>
        <div class="progress-line"></div>
        <div class="progress-step">
            <div class="step-dot">2</div>
            <div class="step-label">Xác nhận</div>
        </div>
        <div class="progress-line"></div>
        <div class="progress-step">
            <div class="step-dot">3</div>
            <div class="step-label">Kết quả</div>
        </div>
    </div>

    <main class="main-content">
        <div class="card">
            <!-- Order Summary -->
            <div class="order-summary">
                <h2 class="section-title">📦 Thông tin đơn hàng</h2>
                <div class="summary-row">
                    <span class="label">Mã giao dịch LMS</span>
                    <span class="value mono" th:text="${order.khoahocTransactionId}">#123</span>
                </div>
                <div class="summary-row">
                    <span class="label">Khóa học</span>
                    <span class="value" th:text="${order.courseNames != null && !order.courseNames.isEmpty() ? order.courseNames : 'Không rõ'}">Khóa học A</span>
                </div>
                <div class="summary-row">
                    <span class="label">Người dùng ID</span>
                    <span class="value mono" th:text="${order.userId}">1</span>
                </div>
                <div class="divider"></div>
                <div class="summary-row total">
                    <span class="label">Tổng thanh toán</span>
                    <span class="value amount" th:text="${#numbers.formatDecimal(order.amount, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'">500,000 VNĐ</span>
                </div>
            </div>

            <!-- Payment Method Selection -->
            <form th:action="@{/pay/confirm}" method="post">
                <input type="hidden" name="gwOrderId" th:value="${order.gwOrderId}">
                <input type="hidden" name="returnUrl" th:value="${returnUrl}">

                <h2 class="section-title" style="margin-top:28px;">💳 Chọn phương thức thanh toán</h2>

                <div class="method-grid">
                    <label class="method-card">
                        <input type="radio" name="paymentMethod" value="VNPAY" required>
                        <div class="method-inner">
                            <div class="method-logo vnpay">VNPay</div>
                            <div class="method-name">VNPay</div>
                            <div class="method-desc">Thanh toán qua cổng VNPay</div>
                        </div>
                    </label>

                    <label class="method-card">
                        <input type="radio" name="paymentMethod" value="MOMO">
                        <div class="method-inner">
                            <div class="method-logo momo">MoMo</div>
                            <div class="method-name">Ví MoMo</div>
                            <div class="method-desc">Thanh toán qua ví MoMo</div>
                        </div>
                    </label>

                    <label class="method-card">
                        <input type="radio" name="paymentMethod" value="ZALOPAY">
                        <div class="method-inner">
                            <div class="method-logo zalopay">ZaloPay</div>
                            <div class="method-name">ZaloPay</div>
                            <div class="method-desc">Thanh toán qua ZaloPay</div>
                        </div>
                    </label>

                    <label class="method-card">
                        <input type="radio" name="paymentMethod" value="BANKING">
                        <div class="method-inner">
                            <div class="method-logo banking">ATM</div>
                            <div class="method-name">Thẻ ATM / Internet Banking</div>
                            <div class="method-desc">Thẻ nội địa & ngân hàng</div>
                        </div>
                    </label>

                    <label class="method-card">
                        <input type="radio" name="paymentMethod" value="STRIPE">
                        <div class="method-inner">
                            <div class="method-logo stripe">Stripe</div>
                            <div class="method-name">Thẻ Quốc tế</div>
                            <div class="method-desc">Visa / Mastercard / Amex</div>
                        </div>
                    </label>
                </div>

                <div class="action-row">
                    <button type="submit" class="btn btn-primary btn-lg">
                        Tiếp tục thanh toán →
                    </button>
                </div>
            </form>

            <!-- Cancel -->
            <form th:action="@{/pay/cancel}" method="post" style="margin-top:12px; text-align:center;">
                <input type="hidden" name="gwOrderId" th:value="${order.gwOrderId}">
                <input type="hidden" name="returnUrl" th:value="${returnUrl}">
                <button type="submit" class="btn btn-ghost">Hủy và quay lại</button>
            </form>
        </div>

        <p class="footer-note">🔐 Giao dịch được mã hóa 256-bit. Thông tin của bạn được bảo mật tuyệt đối.</p>
    </main>
</div>
<script th:src="@{/js/pay.js}"></script>
</body>
</html>
